    expected_response: 'To enable visibility for Tekton, you must first grant read
      access in the `ClusterRole` for the `tekton.dev` apiGroup, allowing `get` and
      `list` verbs for the `pipelines`, `pipelineruns`, and `taskruns` resources.
      Following that, to make the Tekton PipelineRuns list appear in the side panel
      and to show the latest PipelineRuns status in the Topology node decorator, you
      need to add the following configurations to the `kubernetes.customResources`
      property in your `app-config.yaml` file: `group: ''tekton.dev'', apiVersion:
      ''v1'', plural: ''pipelines''`, `group: ''tekton.dev'', apiVersion: ''v1'',
      plural: ''pipelineruns''`, and `group: ''tekton.dev'', apiVersion: ''v1'', plural:
      ''taskruns''`.'
    query: As a platform engineer responsible for integrating CI/CD tooling, what
      are the precise configuration steps, including both RBAC rules and `app-config.yaml`
      modifications, that are necessary to enable the visibility of Tekton resources
      like PipelineRuns within the developer platform's user interface?
    response: "To integrate Tekton into Red Hat Developer Hub (RHDH) and surface resources\
      \ like `PipelineRuns` in the UI, you need to configure the **Kubernetes backend**\
      \ to fetch Tekton Custom Resource Definitions (CRDs). RHDH uses the Kubernetes\
      \ API to securely pull this data, which requires explicit RBAC permissions on\
      \ the cluster and specific configurations in your `app-config.yaml`.\n\nHere\
      \ are the precise steps to achieve this.\n\n---\n\n### Phase 1: Kubernetes RBAC\
      \ Configuration\n\nRHDH requires a `ServiceAccount` with read-only access to\
      \ Tekton resources and Pod logs (essential for viewing pipeline step outputs).\n\
      \n**1. Create the ServiceAccount, ClusterRole, and RoleBinding**\nApply the\
      \ following YAML to your Kubernetes/OpenShift cluster where Tekton is running:\n\
      \n```yaml\n---\napiVersion: v1\nkind: ServiceAccount\nmetadata:\n  name: rhdh-tekton-viewer\n\
      \  namespace: rhdh-backend # Replace with the namespace where RHDH is deployed\
      \ or your auth namespace\n---\napiVersion: rbac.authorization.k8s.io/v1\nkind:\
      \ ClusterRole\nmetadata:\n  name: rhdh-tekton-viewer-role\nrules:\n  # Permissions\
      \ for Tekton resources\n  - apiGroups: [\"tekton.dev\"]\n    resources: [\"\
      pipelines\", \"pipelineruns\", \"taskruns\", \"tasks\"]\n    verbs: [\"get\"\
      , \"list\", \"watch\"]\n  # Permissions to view Pods and fetch logs for PipelineRun\
      \ steps\n  - apiGroups: [\"\"]\n    resources: [\"pods\", \"pods/log\"]\n  \
      \  verbs: [\"get\", \"list\", \"watch\"]\n---\napiVersion: rbac.authorization.k8s.io/v1\n\
      kind: ClusterRoleBinding\nmetadata:\n  name: rhdh-tekton-viewer-binding\nsubjects:\n\
      \  - kind: ServiceAccount\n    name: rhdh-tekton-viewer\n    namespace: rhdh-backend\
      \ # Must match the ServiceAccount namespace\nroleRef:\n  kind: ClusterRole\n\
      \  name: rhdh-tekton-viewer-role\n  apiGroup: rbac.authorization.k8s.io\n```\n\
      \n**2. Extract the ServiceAccount Token**\nYou will need a long-lived token\
      \ for this `ServiceAccount` to authenticate RHDH against the cluster API. Extract\
      \ it using:\n```bash\nkubectl create token rhdh-tekton-viewer -n rhdh-backend\
      \ --duration=8760h\n```\n*(Note: Securely store this token as a secret/environment\
      \ variable, e.g., `K8S_TEKTON_TOKEN`, for your `app-config.yaml`).*\n\n---\n\
      \n### Phase 2: `app-config.yaml` Modifications\n\nThe Tekton frontend plugin\
      \ relies on the Backstage Kubernetes backend. You must configure the cluster\
      \ connection and explicitly declare Tekton CRDs so the backend knows to scrape\
      \ them.\n\nAdd or update the `kubernetes` section in your `app-config.yaml`:\n\
      \n```yaml\nkubernetes:\n  serviceLocatorMethod:\n    type: 'multiTenant'\n \
      \ clusterLocatorMethods:\n    - type: 'config'\n      clusters:\n        - url:\
      \ ${K8S_CLUSTER_URL} # e.g., https://api.my-cluster.com:6443\n          name:\
      \ my-tekton-cluster\n          authProvider: 'serviceAccount'\n          skipTLSVerify:\
      \ false\n          # Ensure you map the token you generated in Phase 1 here:\n\
      \          serviceAccountToken: ${K8S_TEKTON_TOKEN}\n          \n          #\
      \ Optional: Define standard labels RHDH should use to match resources to entities\n\
      \          customResources:\n            # Tekton PipelineRuns\n           \
      \ - group: 'tekton.dev'\n              apiVersion: 'v1' # Use 'v1beta1' if you\
      \ are on an older Tekton version\n              plural: 'pipelineruns'\n   \
      \         # Tekton TaskRuns\n            - group: 'tekton.dev'\n           \
      \   apiVersion: 'v1'\n              plural: 'taskruns'\n            # Tekton\
      \ Pipelines\n            - group: 'tekton.dev'\n              apiVersion: 'v1'\n\
      \              plural: 'pipelines'\n```\n\n---\n\n### Phase 3: Catalog Entity\
      \ Annotations and Labels\n\nFor RHDH to correlate a specific `PipelineRun` in\
      \ the cluster with a `Component` in the software catalog, the Kubernetes resources\
      \ and the `catalog-info.yaml` must be properly labeled and annotated.\n\n**1.\
      \ Update the `catalog-info.yaml`**\nDevelopers must add the Kubernetes annotation\
      \ to their component definition so RHDH knows how to filter the cluster resources:\n\
      \n```yaml\napiVersion: backstage.io/v1alpha1\nkind: Component\nmetadata:\n \
      \ name: my-node-service\n  annotations:\n    # Standard Kubernetes plugin annotation\n\
      \    backstage.io/kubernetes-id: \"my-node-service\"\n    # Optional: Scope\
      \ the search to a specific namespace for performance\n    backstage.io/kubernetes-namespace:\
      \ \"my-app-namespace\"\nspec:\n  type: service\n  lifecycle: experimental\n\
      \  owner: team-alpha\n```\n\n**2. Label the Tekton PipelineRuns**\nWhen your\
      \ CI/CD system creates the `PipelineRun`, it **must** include the matching Kubernetes\
      \ label. Without this label, RHDH will not link the `PipelineRun` to the catalog\
      \ entity.\n\n```yaml\napiVersion: tekton.dev/v1\nkind: PipelineRun\nmetadata:\n\
      \  generateName: my-node-service-run-\n  labels:\n    # This label MUST match\
      \ the backstage.io/kubernetes-id annotation\n    backstage.io/kubernetes-id:\
      \ \"my-node-service\"\nspec:\n  pipelineRef:\n    name: my-node-service-pipeline\n\
      \  # ...\n```\n\n*(Note: Depending on the specific Tekton plugin version configured\
      \ in RHDH, you can alternatively use the label `app.kubernetes.io/part-of: \"\
      my-node-service\"`. The Backstage Kubernetes label selector looks for either\
      \ by default).*\n\n### Summary of Validation\nOnce these configurations are\
      \ applied and RHDH is restarted:\n1. Navigate to your specific Component in\
      \ the RHDH catalog.\n2. Click on the **CI/CD** or **Tekton** tab.\n3. RHDH will\
      \ use the `K8S_TEKTON_TOKEN` to hit the cluster API, query the `tekton.dev/v1`\
      \ resources filtered by the `backstage.io/kubernetes-id` label, and render the\
      \ pipeline topology, status, and step logs."
