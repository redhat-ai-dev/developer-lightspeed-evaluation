  description: plugins
  turns:
  - contexts:
    - 'actions (custom actions) for fetching and registering resources in the catalog.
      The custom actions in Developer Hub enable you to facilitate and automate the
      management of records. Using the custom actions, you can perform the following
      actions: Create, update, or delete a record Retrieve information about a single
      record or multiple records ## Enabling ServiceNow custom actions plugin in Red
      Hat Developer Hub In Red Hat Developer Hub, the ServiceNow custom actions are
      provided as a pre-loaded plugin, which is disabled by default. You can enable
      the custom actions plugin using the following procedure. Red Hat Developer Hub
      is installed and running. You have created a project in the Developer Hub. 1.
      To activate the custom actions plugin, add a package with plugin name and update
      the disabled field in your Helm chart as follows: ```yaml global: dynamic: includes:
      dynamic plugins.default.yaml plugins: package: ./dynamic plugins/dist/backstage
      community plugin scaffolder backend module servicenow dynamic disabled: false
      ``` [NOTE] ---- The default configuration for a plugin is extracted from the
      dynamic-plugins.default.yaml file, however, you can use a pluginConfig entry
      to override the default configuration. ---- 2. Set the following variables in
      the Helm chart to access the custom actions: ```yaml servicenow: # The base
      url of the ServiceNow instance. baseUrl: ${SERVICENOW_BASE_URL} # The username
      to use for authentication. username: ${SERVICENOW_USERNAME} # The password to
      use for authentication. password: ${SERVICENOW_PASSWORD} ``` ## Supported ServiceNow
      custom actions in Red Hat Developer Hub The ServiceNow custom actions enable
      you to manage records in the Red Hat Developer Hub. The custom actions support
      the following HTTP methods for API requests: GET: Retrieves specified information
      from a specified resource endpoint POST: Creates or updates a resource PUT:
      Modify a resource PATCH: Updates a resource DELETE: Deletes a resource [GET]
      servicenow:now:table:retrieveRecord:: Retrieves information of a specified record
      from a table in the Developer Hub. [GET] servicenow:now:table:retrieveRecords::
      Retrieves information about multiple records from a table in the Developer Hub.
      [POST] servicenow:now:table:createRecord:: Creates a record in a table in the
      Developer Hub. [PUT] servicenow:now:table:modifyRecord:: Modifies a record in
      a table in the Developer Hub. [PATCH] servicenow:now:table:updateRecord:: Updates
      a record in a table in the Developer Hub. [DELETE] servicenow:now:table:deleteRecord::
      Deletes a record from a table in the Developer Hub. # Kubernetes custom actions
      in Red Hat Developer Hub With Kubernetes custom actions, you can create and
      manage Kubernetes resources. The Kubernetes custom actions plugin is preinstalled
      and disabled on a Developer Hub instance by default. You can disable or enable
      the Kubernetes custom actions plugin, and change other parameters, by configuring
      the Red Hat Developer Hub Helm chart. [NOTE] ---- Kubernetes scaffolder actions
      and Kubernetes custom actions refer to the same concept throughout this documentation.
      ---- ## Enabling Kubernetes custom actions plugin in Red Hat Developer Hub In
      Red Hat Developer Hub, the Kubernetes custom actions are provided as a preinstalled
      plugin, which is disabled by default. You can enable the Kubernetes custom actions
      plugin by updating the disabled key value in your Helm chart. You have installed
      Red Hat Developer Hub with the Helm chart. To enable the Kubernetes custom actions
      plugin, complete the following step: In your Helm chart, add a package with
      the Kubernetes custom action plugin name and update the disabled field. For
      example: ```yaml global: dynamic: includes: dynamic plugins.default.yaml plugins:
      package: ./dynamic plugins/dist/backstage community plugin scaffolder backend
      module kubernetes dynamic disabled: false ``` [NOTE] ---- The default configuration
      for a plugin is extracted from the dynamic-plugins.default.yaml file, however,
      you can use a pluginConfig entry to override the default configuration. ----
      ## Using Kubernetes custom actions plugin in Red Hat Developer Hub In Red Hat
      Developer Hub, the Kubernetes custom actions enable you to run template actions
      for Kubernetes. To use a Kubernetes custom action in your custom template, add
      the following Kubernetes actions to your template: ```yaml action: kubernetes:create
      namespace id: create kubernetes namespace name: Create kubernetes namespace
      input: namespace: my rhdh project clusterRef: bar token: TOKEN skipTLSVerify:
      false caData: Zm9v labels: app.io/type=ns; app.io/managed by=org; ``` Configuring
      templates ## Creating a template using Kubernetes custom actions in Red Hat
      Developer Hub To create a template, define a Template object as a YAML file.
      The Template object describes the template and its metadata. It also contains
      required input variables and a list of actions that are executed by the scaffolding
      service. ```yaml apiVersion: scaffolder.backstage.io/v1beta3 kind: Template
      metadata: name: create-kubernetes-namespace title: Create a kubernetes namespace
      description: Create a kubernetes namespace spec: type: service parameters: -
      title: Information required: [namespace, token] properties: namespace: title:
      Namespace name type: string description: Name of the namespace to be created
      clusterRef: title: Cluster reference type: string description: Cluster resource
      entity reference from the catalog ui:field: EntityPicker ui:options: catalogFilter:
      kind: Resource url: title: Url type: string description: Url of the kubernetes
      API, will be used if clusterRef is not provided token: title: Token type: string
      ui:field: Secret description: Bearer token to authenticate with skipTLSVerify:
      title: Skip TLS verification type: boolean description: Skip TLS certificate
      verification, not recommended to use in production environment, default to false
      caData: title: CA data type: string ui:field: Secret description: Certificate
      Authority base64 encoded certificate labels: title: Labels type: string description:
      Labels to be applied to the namespace ui:widget: textarea ui:options: rows:
      3 ui:help: ''Hint: Separate multiple labels with a semicolon!'' ui:placeholder:
      ''kubernetes.io/type=namespace; app.io/managed-by=org'' steps: - id: create-kubernetes-namespace
      name: Create kubernetes namespace action: kubernetes:create-namespace input:
      namespace: ${{ parameters.namespace }} clusterRef: ${{ parameters.clusterRef
      }} url: ${{ parameters.url }} token: ${{ secrets.token }} skipTLSVerify: ${{
      parameters.skipTLSVerify }} caData: ${{ secrets.caData }} labels: ${{ parameters.labels
      }} ``` ## Supported Kubernetes custom actions in Red Hat Developer Hub In Red
      Hat Developer Hub, you can use custom Kubernetes actions in Scaffolder templates.
      Action: kubernetes:create-namespace:: Creates a namespace for the Kubernetes
      cluster in the Developer Hub. # Configuring Red Hat Developer Hub Events Module
      Use the Events Module together with scheduled updates to make sure your GitHub
      user or catalog entities are updated whenever changes occur in the external
      system. [IMPORTANT] ---- This is a Technology Preview feature only. Technology
      Preview features are not supported with'
    expected_response: To enable custom actions plugins for ServiceNow or Kubernetes
      in Red Hat Developer Hub, you must configure the Helm chart. You need to add
      a package with the plugin name and update the "disabled" field to "false". For
      the ServiceNow plugin, you must also set variables in the Helm chart to access
      the custom actions, including "baseUrl", "username", and "password".
    query: how i enable the custom actions plugins with the Helm chart, what i need
      to change?
    response: "To enable custom actions (specifically Scaffolder backend modules)\
      \ in Red Hat Developer Hub (RHDH) using the Helm chart, you primarily need to\
      \ modify your `values.yaml` file to include the desired plugins in the **dynamic\
      \ plugins** configuration.\n\nSince RHDH is built on a dynamic plugin architecture,\
      \ you don't need to rebuild the image; you simply \"plug them in\" via configuration.\n\
      \nHere is what you need to change:\n\n### 1. Update `values.yaml`\nIn your `values.yaml`,\
      \ locate the `global.dynamicPlugins` section. You need to add the package name\
      \ of the plugin that contains the custom actions.\n\n```yaml\nglobal:\n  dynamicPlugins:\n\
      \    plugins:\n      - package: '@backstage/plugin-scaffolder-backend-module-github'\
      \ # Example: GitHub Actions\n        disabled: false\n      - package: './local-plugins/my-custom-action'\
      \ # Example: A local custom plugin\n        disabled: false\n```\n\n### 2. Configure\
      \ the Scaffolder (if needed)\nSome custom actions require specific configurations\
      \ in the `app-config` section of your Helm chart. This is usually done under\
      \ `backstage.appConfig`.\n\n```yaml\nbackstage:\n  appConfig:\n    scaffolder:\n\
      \      # Some actions require specific flags or backend settings\n      experimental:\n\
      \        cascadingRules: [] \n```\n\n### 3. Detailed Steps based on Plugin Type\n\
      \n#### Case A: Enabling an existing Red Hat or Community Plugin\nIf you are\
      \ trying to enable a standard module (like Ansible, Azure, or Gerrit actions),\
      \ add it to the `plugins` list:\n\n```yaml\nglobal:\n  dynamicPlugins:\n   \
      \ plugins:\n      - package: '@redhat/backstage-plugin-scaffolder-backend-module-ansible'\n\
      \        disabled: false\n```\n\n#### Case B: Enabling your own Custom-Coded\
      \ Action\nIf you have written your own custom action code:\n1.  **Package it:**\
      \ It must be packaged as a dynamic plugin (using the `@backstage/cli package\
      \ build` command).\n2.  **Host it:** You can host it on a private NPM registry\
      \ or include it in a custom container image.\n3.  **Reference it:** Point to\
      \ the package in the `values.yaml`. If you are mounting the code via a Persistent\
      \ Volume, the `package` path would be the path within the container.\n\n###\
      \ 4. Apply the Changes\nAfter updating your `values.yaml`, apply the changes\
      \ using Helm:\n\n```bash\nhelm upgrade <release-name> redhat-developer/redhat-developer-hub\
      \ -f values.yaml\n```\n\n### How to verify\nOnce the pod restarts:\n1.  Navigate\
      \ to your Red Hat Developer Hub instance.\n2.  Go to **Create** (Software Templates).\n\
      3.  Click the **dots menu** (top right) and select **Installed Actions**.\n\
      4.  You should see your new actions listed there.\n\n### Important Note on Compatibility\n\
      Ensure that the version of the plugin you are adding is compatible with the\
      \ version of RHDH you are running. Using `@latest` can sometimes cause issues;\
      \ it is best practice to pin the version:\n`package: '@backstage/plugin-scaffolder-backend-module-github@0.1.0'`.\n\
      \n**Do you have a specific custom action or plugin in mind that you are trying\
      \ to enable?** I can provide the exact package name and configuration if so."
