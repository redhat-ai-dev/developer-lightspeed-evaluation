- conversation_group_id: installation-9
  description: installation
  turns:
  - contexts:
    - '# Installing Red Hat Developer Hub in an air-gapped environment # Air gapped
      environment An air-gapped environment, also known as an air-gapped network or
      isolated network, ensures security by physically segregating the system or network.
      This isolation is established to prevent unauthorized access, data transfer,
      or communication between the air-gapped system and external sources. You can
      install the Red Hat Developer Hub in an air-gapped environment to ensure security
      and meet specific regulatory requirements. # Installing Red Hat Developer Hub
      in an air-gapped environment with the Operator You can install Red Hat Developer
      Hub in a fully disconnected or partially disconnected environment using the
      Red Hat Developer Hub Operator. For a list of supported platforms, see the Red
      Hat Developer Hub Life Cycle page. ##'
    expected_response: You can install the Red Hat Developer Hub in an air-gapped
      environment to ensure security and meet specific regulatory requirements by
      using the Red Hat Developer Hub Operator. This method works for fully disconnected
      or partially disconnected environments.
    query: How can I install the Red Hat Develper Hub in our air-gapped envirnment
      to ensure security?
    response: "Installing Red Hat Developer Hub (RHDH) in an air-gapped (disconnected)\
      \ environment requires a strategic approach to ensure all container images,\
      \ dependencies, and plugins are available locally. Since RHDH is built on Backstage\
      \ and typically runs on Red Hat OpenShift, the process involves mirroring resources\
      \ and configuring the internal registry.\n\nHere is a step-by-step guide to\
      \ installing RHDH in an air-gapped environment.\n\n---\n\n### 1. Prerequisite:\
      \ Image Mirroring\nIn an air-gapped environment, you must mirror the RHDH images\
      \ from the Red Hat ecosystem to your private container registry (e.g., Quay\
      \ or Artifactory).\n\n1.  **Identify the Images:** You will need the RHDH core\
      \ image, the PostgreSQL image (if using the bundled database), and any sidecars\
      \ or operator images.\n2.  **Use `oc mirror`:** Use the OpenShift Mirroring\
      \ tool to transfer the RHDH Operator and the Hub images.\n    *   Create a `ImageSetConfiguration`\
      \ file.\n    *   Mirror the RHDH operator bundle and the associated images to\
      \ your private registry.\n3.  **Trust the Registry:** Ensure your OpenShift\
      \ cluster is configured to trust the certificate of your private registry.\n\
      \n### 2. Install the RHDH Operator\nThe recommended way to manage RHDH is via\
      \ the **Red Hat Developer Hub Operator**.\n\n1.  **Create a CatalogSource:**\
      \ Since you are disconnected, you must create a `CatalogSource` that points\
      \ to the mirrored index image in your local registry.\n2.  **Install the Operator:**\
      \ Navigate to the **OperatorHub** in the OpenShift console (filtered by your\
      \ local catalog) and install the Red Hat Developer Hub Operator.\n\n### 3. Configure\
      \ Dynamic Plugins (Crucial for Air-Gap)\nRHDH uses **dynamic plugins** which\
      \ are often downloaded at runtime from external registries (like NPM). In an\
      \ air-gapped setup, this will fail.\n\n*   **Solution A: Local NPM Registry.**\
      \ Point RHDH to an internal Nexus or Artifactory instance that proxies or hosts\
      \ the required plugin packages.\n*   **Solution B: Custom Image.** Build a custom\
      \ RHDH image that pre-loads all the necessary plugins into the `/opt/app-root/src/dynamic-plugins-root`\
      \ directory, so no external fetching is required at startup.\n\n### 4. Deploy\
      \ the RedHatDeveloperHub Custom Resource (CR)\nYou will need to create a `Backstage`\
      \ (or `RedHatDeveloperHub`) custom resource. You must modify the YAML to point\
      \ to your internal resources:\n\n```yaml\napiVersion: rhdh.redhat.com/v1alpha1\n\
      kind: RedhatDeveloperHub\nmetadata:\n  name: my-rhdh\nspec:\n  backstage:\n\
      \    image: <your-internal-registry>/rhdh/rhdh-hub-rhel9:latest\n    podSchema:\n\
      \      containers:\n        - name: backstage\n          env:\n            -\
      \ name: NODE_EXTRA_CA_CERTS\n              value: /opt/app-root/src/certs/root-ca.pem\n\
      \  database:\n    enableLocalDb: true # If using the internal PostgreSQL, ensure\
      \ its image is also mirrored\n```\n\n### 5. Handling External Integrations\n\
      Since the environment is air-gapped, RHDH won't be able to reach public APIs\
      \ (GitHub.com, public Helm repos, etc.).\n\n*   **Internal SCM:** Configure\
      \ the `app-config.yaml` to point to internal GitLab, Bitbucket, or GitHub Enterprise\
      \ instances.\n*   **Software Templates:** Ensure your Backstage templates point\
      \ to internal Git repositories.\n*   **Documentation:** If you use \"TechDocs,\"\
      \ ensure the documentation generation process uses local builders and stores\
      \ output in an internal S3-compatible bucket (like MinIO).\n\n### 6. Security\
      \ Hardening\nTo maintain the security of your air-gapped environment:\n\n1.\
      \  **Network Policies:** Implement `NetworkPolicies` to restrict RHDH communication\
      \ only to the database and your internal SCM/CI-CD tools.\n2.  **Secrets Management:**\
      \ Use OpenShift Secrets or an internal Vault to handle sensitive information\
      \ (database passwords, SCM tokens).\n3.  **RBAC:** Define strict Role-Based\
      \ Access Control within RHDH to ensure developers only see the catalogs and\
      \ templates relevant to their clearance level.\n\n### Summary Checklist\n| Task\
      \ | Tool/Method |\n| :--- | :--- |\n| **Mirroring** | `oc mirror` or `skopeo`\
      \ |\n| **Registry** | Private Quay / Artifactory |\n| **Installation** | RHDH\
      \ Operator via Local CatalogSource |\n| **Plugins** | Internal NPM or Pre-bundled\
      \ in Custom Image |\n| **SCM** | Internal GitLab/GitHub/Bitbucket |\n\nFor more\
      \ specific guidance on your current OpenShift version or plugin requirements,\
      \ feel free to ask!"
