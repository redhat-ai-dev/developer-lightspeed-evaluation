    expected_response: "To view OpenShift routes, you must first grant read access\
      \ to the routes resource in the Cluster Role. This is done by adding the following\
      \ configuration: ```yaml\napiVersion: rbac.authorization.k8s.io/v1\nkind: ClusterRole\n\
      metadata:\n  name: backstage read only\nrules:\n  ...\n  apiGroups: route.openshift.io\n\
      \  resources: routes\n  verbs: get list\n```. Additionally, you need to add\
      \ the corresponding custom resource property in your app-config.yaml file like\
