  description: plugins
  turns:
  - contexts:
    - 'Red Hat production service level agreements (SLAs) and might not be functionally
      complete. Red Hat does not recommend using them in production. These features
      provide early access to upcoming product features, enabling customers to test
      functionality and provide feedback during the development process. For more
      information about the support scope of Red Hat Technology Preview features,
      see Technology Preview Features Support Scope. ---- ## Configuring Events Module
      for GitHub Learn how to configure Events Module for use with the RHDH GitHub
      Discovery feature and GitHub organization data. You have added your GitHub integration
      credentials in the app config.yaml file. You have defined the schedule.frequency
      in the app config.yaml file as longer time period, such as 24 hours. For GitHub
      Discovery only: You have enabled GitHub Discovery. For GitHub Organizational
      Data only: You have enabled Github Authentication with user ingestion. 1. Add
      the GitHub Events Module to your dynamic-plugins.yaml configuration file as
      follows: ```yaml data: dynamic plugins.yaml: | includes: dynamic plugins.default.yaml
      plugins: package: oci://registry.access.redhat.com/rhdh/backstage plugin events
      backend module github@sha256:2c1ccc4fb01883dc4da1aa0c417d6e28d944c6ce941454ee41698f2c1812035c
      disabled: false ``` 2. To create HTTP endpoints to receive events for the github,
      add the following to your app-config.yaml file: ```yaml events: http: topics:
      github modules: github: webhookSecret: ${GITHUB_WEBHOOK_SECRET} ``` [IMPORTANT]
      ---- Secure your workflow by adding a webhook secret token to validate webhook
      deliveries. ---- 3. Create a GitHub webhook with the following specifications:
      * For Github Discovery Events: push, repository * For Github Organizational
      Data Events: organization, team and membership * Content Type: application/json
      * Payload URL: https://<my_developer_hub_domain>/api/events/http/github [NOTE]
      ---- Payload URL is the URL exposed after configuring the HTTP endpoint. ----
      Check the log for an entry that confirms that http endpoint was set up successfully
      to receive events from the GitHub webhook. Example of a log of successfully
      set up http endpoint:: ```code {"level":"\u001b[32minfo\u001b[39m","message":"Registered
      /api/events/http/github to receive events","plugin":"events","service":"backstage","timestamp":"2025-11-03
      02:19:12"} ``` For GitHub Discovery only: Trigger a GitHub push event by adding,
      modifying or deleting the catalog info.yaml file in the repository where you
      set up your webhook. A record of this event should appear in the pod logs of
      your RHDH instance. Example of a log with changes to catalog info.yaml file::
      ```code {"level":"\u001b[32minfo\u001b[39m","message":"Processed Github push
      event: added 0 - removed 0 - modified 1","plugin":"catalog","service":"backstage","span_id":"47534b96c4afc654","target":"github-provider:providerId","timestamp":"2025-06-15
      21:33:14","trace_flags":"01","trace_id":"ecc782deb86aed2027da0ae6b1999e5c"}
      ``` For GitHub Organizational Data only: Newly added users and teams appear
      in the RHDH catalog. # Overriding Core Backend Service Configuration The Red
      Hat Developer Hub (RHDH) backend platform consists of a number of core services
      that are well encapsulated. The RHDH backend installs these default core services
      statically during initialization. Customize a core service by installing it
      as a BackendFeature by using the dynamic plugin functionality. 1. Configure
      Developer Hub to allow a core service override, by setting the corresponding
      core service ID environment variable to true in the Developer Hub app-config.yaml
      configuration file. Environment variables and core service IDs 2. Install your
      custom core service as a BackendFeature as shown in the following example: ```javascript
      // Create the BackendFeature $ export const customRootHttpServerFactory: BackendFeature
      = rootHttpRouterServiceFactory({ configure: ({ app, routes, middleware, logger
      }) => { logger.info( ''Using custom root HttpRouterServiceFactory configure
      function'', ); app.use(middleware.helmet()); app.use(middleware.cors()); app.use(middleware.compression());
      app.use(middleware.logging()); // Add a the custom middleware function before
      all // of the route handlers app.use(addTestHeaderMiddleware({ logger })); app.use(routes);
      app.use(middleware.notFound()); app.use(middleware.error()); }, }); // Export
      the BackendFeature as the default entrypoint $ export default customRootHttpServerFactory;
      ``` + In the previous example, as the BackendFeature overrides the default implementation
      of the HTTP router service, you must set the ENABLE_CORE_ROOTHTTPROUTER_OVERRIDE
      environment variable to true so that the Developer Hub does not install the
      default implementation automatically.'
    expected_response: 'To configure the Events Module for GitHub in Red Hat Developer
      Hub, you must first ensure you have added your GitHub integration credentials
      and defined the `schedule.frequency` in the `app-config.yaml` file, and have
      enabled either GitHub Discovery or Github Authentication with user ingestion.
      The process is as follows: 1. Add the GitHub Events Module to your `dynamic-plugins.yaml`
      configuration file using the package `oci://registry.access.redhat.com/rhdh/backstage
      plugin events backend module github@sha256:2c1ccc4fb01883dc4da1aa0c417d6e28d944c6ce941454ee41698f2c1812035c`.
      2. In your `app-config.yaml` file, create HTTP endpoints to receive events by
      adding a configuration under `events.http.topics.github` and `events.http.modules.github`,
      which must include a `webhookSecret` to validate webhook deliveries. 3. Create
      a GitHub webhook with the Content Type set to `application/json` and the Payload
      URL as `https://<my_developer_hub_domain>/api/events/http/github`. For Github
      Discovery Events, the specifications are `push` and `repository`. For Github
      Organizational Data Events, they are `organization`, `team`, and `membership`.
      You can check the log for an entry confirming the http endpoint was successfully
      set up to verify the configuration.'
    query: As a platform engineer responsible for our internal developer platform,
      could you please provide a comprehensive, step-by-step guide on how to properly
      configure the GitHub Events Module within the Red Hat Developer Hub, including
      the necessary YAML configurations and specific webhook specifications for both
      GitHub Discovery and Organizational Data events?
    response: "As a Platform Engineer, setting up event-driven updates in Red Hat\
      \ Developer Hub (RHDH) is a critical step for ensuring that your software catalog\
      \ and organizational data stay in sync with GitHub in real-time, rather than\
      \ relying solely on polling.\n\nThis guide covers the configuration of the **GitHub\
      \ Events Module**, which allows RHDH to receive webhooks from GitHub to trigger\
      \ immediate processing of catalog entities and organizational changes.\n\n---\n\
      \n### Prerequisites\n1.  **Administrative access** to your GitHub Organization.\n\
      2.  **Access to the RHDH configuration** (`app-config.yaml` or OpenShift Secrets/ConfigMaps).\n\
      3.  A **GitHub Personal Access Token (PAT)** or **GitHub App** already configured\
      \ in RHDH.\n\n---\n\n### Step 1: Configure the GitHub Webhook\nFirst, you must\
      \ tell GitHub where to send the events.\n\n1.  Navigate to your GitHub Organization:\
      \ **Settings > Webhooks > Add webhook**.\n2.  **Payload URL**: `https://<rhdh-domain>/api/events/http/github`\n\
      3.  **Content type**: `application/json`\n4.  **Secret**: Generate a strong\
      \ random string (e.g., `openssl rand -hex 20`). **Save this; you will need it\
      \ for the RHDH YAML.**\n5.  **SSL verification**: Enable (assuming RHDH is on\
      \ HTTPS).\n6.  **Events to trigger**: Select **\"Let me select individual events.\"\
      **\n\n#### Required Events for Discovery and Org Data:\nTo cover both catalog\
      \ discovery and organizational data, select the following:\n\n| Feature | Necessary\
      \ GitHub Events |\n| :--- | :--- |\n| **Catalog Discovery** | `push`, `repository`,\
      \ `workflow_job` (optional) |\n| **Organizational Data** | `membership`, `organization`,\
      \ `team`, `team_add` |\n\n---\n\n### Step 2: Configure RHDH Secrets\nStore your\
      \ webhook secret securely. If you are running RHDH on OpenShift, add it to your\
      \ `secrets`:\n\n```yaml\n# Example secret entry\nGITHUB_WEBHOOK_SECRET: \"your-generated-secret-here\"\
      \n```\n\n---\n\n### Step 3: Configure `app-config.yaml`\nYou need to enable\
      \ the events module and configure the catalog providers to listen for these\
      \ events.\n\n#### 3.1. Enable the GitHub Events Module\nThis section tells RHDH\
      \ how to validate incoming payloads from GitHub.\n\n```yaml\nevents:\n  modules:\n\
      \    github:\n      webhookSecret: ${GITHUB_WEBHOOK_SECRET}\n```\n\n#### 3.2.\
      \ Configure GitHub Discovery (Catalog Entities)\nConfigure the `github` entity\
      \ provider. When a `push` event occurs, the events module will notify this provider\
      \ to refresh the specific repository.\n\n```yaml\ncatalog:\n  providers:\n \
      \   github:\n      yourProviderId: # Unique identifier\n        organization:\
      \ \"your-github-org\"\n        catalogPath: \"/catalog-info.yaml\" # Path to\
      \ your descriptors\n        filters:\n          repositoryVisible: \"public\"\
      \ # or \"all\", \"private\"\n        schedule:\n          frequency: { minutes:\
      \ 30 } # Polling fallback\n          timeout: { minutes: 3 }\n```\n\n#### 3.3.\
      \ Configure Organizational Data (Users & Groups)\nThe `githubOrg` provider processes\
      \ team and membership events to update the RHDH User and Group entities.\n\n\
      ```yaml\ncatalog:\n  providers:\n    githubOrg:\n      id: production-github-org\n\
      \      orgs: [\"your-github-org\"]\n      # The events module automatically\
      \ links to this provider\n      schedule:\n        frequency: { minutes: 60\
      \ } # Polling fallback\n        timeout: { minutes: 15 }\n```\n\n---\n\n###\
      \ Step 4: Verification and Troubleshooting\n\n#### 1. Check GitHub Webhook Logs\n\
      Go to **GitHub Organization Settings > Webhooks > [Your Webhook] > Recent Deliveries**.\
      \ \n- A **202 Accepted** or **200 OK** means RHDH received the event.\n- A **401\
      \ Unauthorized** means the `webhookSecret` in RHDH does not match the GitHub\
      \ Secret.\n- A **404 Not Found** usually means the `backstage-plugin-events-backend`\
      \ is not correctly installed/enabled in your RHDH instance.\n\n#### 2. Check\
      \ RHDH Logs\nSearch your RHDH pod logs for the following strings to confirm\
      \ processing:\n```bash\n# To see event reception\noc logs <rhdh-pod-name> |\
      \ grep \"received event\"\n\n# To see catalog refresh triggers\noc logs <rhdh-pod-name>\
      \ | grep \"Reading GitHub users and groups\"\n```\n\n### Key Technical Notes\
      \ for Platform Engineers:\n*   **Ingress/Network**: Ensure your RHDH instance\
      \ is reachable from GitHub's IP ranges (or use a tool like SMEE.io for internal/VPN-locked\
      \ testing).\n*   **Rate Limiting**: Event-driven architecture significantly\
      \ reduces GitHub API quota consumption compared to frequent polling of large\
      \ organizations.\n*   **Multiple Orgs**: If you manage multiple GitHub Organizations,\
      \ you must create a webhook in **each** organization, all pointing to the same\
      \ RHDH endpoint. RHDH will distinguish them based on the payload content.\n\n\
      By following this configuration, your developers will see their `catalog-info.yaml`\
      \ changes reflected in the Developer Hub within seconds of a `git push`."
