      host parsed from the repository URL).'
    query: how to configure the Bulk Import plugin to use a custom scaffolder workflow
      and what specific input parameters does the plugin provide to the scaffolder
      template task
    response: "Configuring the Bulk Import plugin in Red Hat Developer Hub (RHDH)\
      \ to use a custom scaffolder workflow allows you to standardize how multiple\
      \ repositories are onboarded into your software catalog.\n\nThe Bulk Import\
      \ plugin essentially acts as a trigger that passes repository data into a Scaffolder\
      \ template. Here is how to configure it and the parameters you can expect.\n\
      \n---\n\n### 1. Configuring the Custom Scaffolder Workflow\n\nTo use a custom\
      \ workflow, you must define a Scaffolder template in your catalog and then tell\
      \ the Bulk Import plugin to use its ID.\n\n#### Step A: Register your Custom\
      \ Template\nCreate a template (e.g., `custom-bulk-import-template.yaml`) and\
      \ ensure it is registered in your RHDH catalog. Take note of its `metadata.name`\
      \ (e.g., `custom-bulk-import-template`).\n\n#### Step B: Update `app-config.yaml`\n\
      By default, the plugin looks for a specific template. You can override this\
      \ in your configuration file:\n\n```yaml\ncatalog:\n  import:\n    bulk:\n \
      \     # The ID of the template to use for bulk import operations\n      template:\
      \ template:default/custom-bulk-import-template\n```\n\nIf you are using the\
      \ Red Hat Developer Hub Helm chart or Operator, ensure this configuration is\
      \ added to your ConfigMap or the `app-config` section of your Custom Resource.\n\
      \n---\n\n### 2. Specific Input Parameters Provided to the Scaffolder Task\n\n\
      When the Bulk Import plugin triggers a Scaffolder task, it injects a set of\
      \ parameters into the `spec.parameters` (accessible via `${{ steps['step-id'].input.parameterName\
      \ }}` or directly via `${{ values.parameterName }}` depending on your template\
      \ structure).\n\nThe plugin typically provides a **repository object** containing\
      \ the metadata of the discovered/selected repository. The specific parameters\
      \ include:\n\n| Parameter | Type | Description |\n| :--- | :--- | :--- |\n|\
      \ `repository.name` | `string` | The name of the repository (e.g., `my-service`).\
      \ |\n| `repository.owner` | `string` | The owner or organization name. |\n|\
      \ `repository.organization` | `string` | The organization name (if applicable).\
      \ |\n| `repository.url` | `string` | The full clone URL of the repository. |\n\
      | `repository.host` | `string` | The host of the SCM provider (e.g., `github.com`\
      \ or internal GitLab). |\n| `repository.defaultBranch` | `string` | The default\
      \ branch of the repository (e.g., `main` or `master`). |\n| `repository.repo`\
      \ | `string` | Usually the slug or specific repository identifier. |\n| `targetPath`\
      \ | `string` | The relative path where the `catalog-info.yaml` should be created\
      \ (defaults to `./`). |\n| `pullRequestTitle` | `string` | The title to be used\
      \ if the workflow creates a Pull Request. |\n| `pullRequestBody` | `string`\
      \ | The description/body for the Pull Request. |\n| `componentName` | `string`\
      \ | The suggested name for the new component in the catalog. |\n\n---\n\n###\
      \ 3. Example Scaffolder Template for Bulk Import\n\nHere is an example of how\
      \ your custom template might use these parameters to create a `catalog-info.yaml`\
      \ file via a Pull Request:\n\n```yaml\napiVersion: scaffolder.backstage.io/v1beta3\n\
      kind: Template\nmetadata:\n  name: custom-bulk-import-template\n  title: Custom\
      \ Bulk Import Workflow\n  description: Onboards repositories into RHDH with\
      \ custom metadata.\nspec:\n  type: service\n  # These parameters are populated\
      \ by the Bulk Import plugin\n  parameters:\n    - title: Repository Info\n \
      \     properties:\n        repository:\n          type: object\n        targetPath:\n\
      \          type: string\n        pullRequestTitle:\n          type: string\n\
      \        pullRequestBody:\n          type: string\n\n  steps:\n    - id: fetch-base\n\
      \      name: Fetching Repository\n      action: fetch:plain\n      input:\n\
      \        url: ${{ values.repository.url }}\n\n    - id: generate-catalog-info\n\
      \      name: Generating Catalog Info\n      action: fetch:template\n      input:\n\
      \        url: ./skeleton # A local folder containing your catalog-info.yaml\
      \ template\n        values:\n          name: ${{ values.repository.name }}\n\
      \          owner: ${{ values.repository.owner }}\n          destination: ${{\
      \ values.targetPath }}\n\n    - id: publish-pr\n      name: Creating Pull Request\n\
      \      action: publish:github:pull-request # Or gitlab, bitbucket, etc.\n  \
      \    input:\n        repoUrl: ${{ values.repository.host }}?repo=${{ values.repository.name\
      \ }}&owner=${{ values.repository.owner }}\n        branchName: rhdh-onboarding\n\
      \        title: ${{ values.pullRequestTitle }}\n        description: ${{ values.pullRequestBody\
      \ }}\n```\n\n### Pro-Tips for Red Hat Developer Hub:\n*   **Dynamic Logic:**\
      \ Use the `repository.url` to determine which CI/CD configuration (Tekton vs.\
      \ Jenkins) to inject into the `catalog-info.yaml`.\n*   **RBAC:** Ensure the\
      \ user performing the Bulk Import has the necessary permissions to execute the\
      \ Scaffolder template and that the RHDH backend has the appropriate SCM tokens\
      \ to create Pull Requests in the target repositories.\n*   **Validation:** You\
      \ can add additional steps in your template to validate that a `catalog-info.yaml`\
      \ doesn't already exist before attempting to create a PR."
