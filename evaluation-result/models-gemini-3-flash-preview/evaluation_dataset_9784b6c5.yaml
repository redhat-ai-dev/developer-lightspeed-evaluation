- conversation_group_id: plugins-1
  description: plugins
  turns:
  - contexts:
    - 'Installing and configuring Argo CD You can use the Argo CD plugin to visualize
      the Continuous Delivery (CD) workflows in OpenShift GitOps. ## Enabling the
      Argo CD plugin The Argo CD plugin provides a visual overview of the application&#39;s
      status, deployment details, commit message, author of the commit, container
      image promoted to environment and deployment history. Add Argo CD instance information
      to your app config.yaml configmap as shown in the following example: ```yaml
      argocd: appLocatorMethods: type: ''config'' instances: name: argoInstance1 url:
      https://argoInstance1.com username: ${ARGOCD_USERNAME} password: ${ARGOCD_PASSWORD}
      name: argoInstance2 url: https://argoInstance2.com username: ${ARGOCD_USERNAME}
      password: ${ARGOCD_PASSWORD} ``` [NOTE] ---- Avoid using a trailing slash in
      the url, as it might cause unexpected behavior. ---- * Add the following annotation
      to the entity&#39;s catalog-info.yaml file to identify the Argo CD applications.
      ```yaml annotations: ... # The label that Argo CD uses to fetch all the applications.
      The format to be used is label.key=label.value. For example, rht-gitops.com/janus-argocd=quarkus-app.
      argocd/app selector: ''${ARGOCD_LABEL_SELECTOR}'' ``` (Optional) Add the following
      annotation to the entity&#39;s catalog info.yaml file to switch between Argo
      CD instances as shown in the following example: ```yaml annotations: ... # The
      Argo CD instance name used in `app-config.yaml`. argocd/instance name: ''${ARGOCD_INSTANCE}''
      ``` [NOTE] ---- If you do not set this annotation, the Argo CD plugin defaults
      to the first Argo CD instance configured in app-config.yaml. ---- Add the following
      to your dynamic plugins ConfigMap to enable the Argo CD plugin. ```yaml global:
      dynamic: includes: dynamic plugins.default.yaml plugins: package: oci://ghcr.io/redhat
      developer/rhdh plugin export overlays/roadiehq backstage plugin argo cd backend:<tag>
      disabled: false package: oci://ghcr.io/redhat developer/rhdh plugin export overlays/backstage
      community plugin argocd:<tag> disabled: false ``` The <tag> variable is your
      RHDH application&#39;s version of Backstage and the plugin version, in the format:
      bs_<backstage-version>__<plugin-version> (note the double underscore delimiter).
      This format is only applicable for Community supported plugins. To find the
      correct image tag for <tag>: 1. Look in the RHDH release notes preface for your
      Backstage version. 2. Locate the plugin version for paths starting with oci://ghcr.io
      within one of the tables provided in the Dynamic plugins reference. For example,
      because RHDH 1.9 is based on Backstage 1.45.3, the tag will have the format
      bs_1.45.3__<plugin-version> [TIP] ---- To ensure environment stability, use
      a SHA256 digest instead of a version tag. See Determining SHA256 Digests ----
      ## Enabling Argo CD Rollouts The optional Argo CD Rollouts feature enhances
      Kubernetes by providing advanced deployment strategies, such as blue-green and
      canary deployments, for your applications. When integrated into the backstage
      Kubernetes plugin, it allows developers and operations teams to visualize and
      manage Argo CD Rollouts seamlessly within the Backstage interface. The Backstage
      Kubernetes plugin (@backstage/plugin kubernetes) is installed and configured.
      To install and configure Kubernetes plugin in Backstage, see Installation and
      Configuration guide. You have access to the Kubernetes cluster with the necessary
      permissions to create and manage custom resources and ClusterRoles. The Kubernetes
      cluster has the argoproj.io group resources (for example, Rollouts and AnalysisRuns)
      installed. 1. In the app-config.yaml file in your Backstage instance, add the
      following customResources component under the kubernetes configuration to enable
      Argo Rollouts and AnalysisRuns: ```yaml kubernetes: ... customResources: group:
      ''argoproj.io'' apiVersion: ''v1alpha1'' plural: ''Rollouts'' group: ''argoproj.io''
      apiVersion: ''v1alpha1'' plural: ''analysisruns'' ``` 2. Grant ClusterRole permissions
      for custom resources. [NOTE] ---- * If the Backstage Kubernetes plugin is already
      configured, the ClusterRole permissions for Rollouts and AnalysisRuns might
      already be granted. * Use the prepared manifest to provide read-only ClusterRole
      access to both the Kubernetes and ArgoCD plugins. ---- 1. If the ClusterRole
      permission is not granted, use the following YAML manifest to create the ClusterRole:
      ```yaml apiVersion: rbac.authorization.k8s.io/v1 kind: ClusterRole metadata:
      name: backstage read only rules: apiGroups: argoproj.io resources: rollouts
      analysisruns verbs: get list ``` 1. Apply the manifest to the cluster using
      kubectl: ```bash $ kubectl apply f <your clusterrole file>.yaml ``` 2. Ensure
      the ServiceAccount accessing the cluster has this ClusterRole assigned. 3. Add
      annotations to catalog-info.yaml to identify Kubernetes resources for Backstage.
      1. For identifying resources by entity ID: ```yaml annotations: ... backstage.io/kubernetes
      id: <BACKSTAGE_ENTITY_NAME> ``` 2. (Optional) For identifying resources by namespace:
      ```yaml annotations: ... backstage.io/kubernetes namespace: <RESOURCE_NAMESPACE>
      ``` 3. For using custom label selectors, which override resource identification
      by entity ID or namespace: ```yaml annotations: ... backstage.io/kubernetes
      label selector: ''app=my app,component=front end'' ``` [NOTE] ---- Ensure you
      specify the labels declared in backstage.io/kubernetes-label-selector on your
      Kubernetes resources. This annotation overrides entity-based or namespace-based
      identification annotations, such as backstage.io/kubernetes-id and backstage.io/kubernetes-namespace.
      ---- 4. Add label to Kubernetes resources to enable Backstage to find the appropriate
      Kubernetes resources. 1. Backstage Kubernetes plugin label: Add this label to
      map resources to specific Backstage entities. ```yaml labels: ... backstage.io/kubernetes
      id: <BACKSTAGE_ENTITY_NAME> ``` 2. GitOps application mapping: Add this label
      to map Argo CD Rollouts to a specific GitOps application ```yaml labels: ...
      app.kubernetes.io/instance: <GITOPS_APPLICATION_NAME> ``` [NOTE] ---- If using
      the label selector annotation (backstage.io/kubernetes-label-selector), ensure
      the specified labels are present on the resources. The label selector will override
      other annotations like kubernetes-id or kubernetes-namespace. ---- 1. Push the
      updated configuration to your GitOps repository to trigger a rollout. 2. Open
      Red Hat Developer Hub interface and navigate to the entity you configured. 3.
      Select the CD tab and then select the GitOps application. The side panel opens.
      4. In the Resources table of the side panel, verify that the following resources
      are displayed: * Rollouts * AnalysisRuns (optional) 5. Expand a rollout resource
      and review the following details: * The Revisions row displays traffic distribution
      details for different rollout versions. * The Analysis Runs row displays the
      status of analysis tasks that evaluate rollout success. Installing and viewing
      plugins in Red Hat Developer Hub #'
    expected_response: 'To enable the Argo CD plugin, you must first add Argo CD instance
      information to your app-config.yaml configmap. After that, add the annotation
      `argocd/app-selector: ''${ARGOCD_LABEL_SELECTOR}''` to the entity''s catalog-info.yaml
      file to identify the Argo CD applications. Optionally, you can add the `argocd/instance-name:
      ''${ARGOCD_INSTANCE}''` annotation to switch between Argo CD instances; if this
      is not set, the plugin defaults to the first instance configured in app-config.yaml.
      Finally, you must add configurations for the packages `oci://ghcr.io/redhat
      developer/rhdh plugin export overlays/roadiehq backstage plugin argo cd backend:<tag>`
      and `oci://ghcr.io/redhat developer/rhdh plugin export overlays/backstage community
      plugin argocd:<tag>` to your dynamic plugins ConfigMap, ensuring the `disabled`
      flag is set to false for both.'
    query: hey so im trying to get the argo cd plugin working in our Red Hat Developer
      Hub but i dont know what all the steps is, can you tell me how to enable it
      and what i need to change in the configmaps and the catalog files to make it
      show up?
    response: "Enabling the Argo CD plugin in Red Hat Developer Hub (RHDH) involves\
      \ a few key steps: configuring the connection to your Argo CD instance, ensuring\
      \ the plugin is active, and then \"tagging\" your software components so the\
      \ Hub knows which Argo CD application belongs to which component.\n\nHere is\
      \ a step-by-step guide to getting it up and running.\n\n---\n\n### 1. Configure\
      \ the Argo CD Integration (`app-config.yaml`)\nIn RHDH, you need to tell the\
      \ backend how to talk to your Argo CD API. This is usually managed via the `app-config.yaml`\
      \ which is stored in a **ConfigMap** in your OpenShift/Kubernetes namespace.\n\
      \nAdd the following configuration block under the root level:\n\n```yaml\nargocd:\n\
      \  appLocatorMethods:\n    - type: 'config'\n      instances:\n        - name:\
      \ main-argo-instance\n          url: https://argocd-server-route-argocd.apps.your-cluster.com\n\
      \          # It is highly recommended to use a Token for authentication\n  \
      \        token: ${ARGOCD_AUTH_TOKEN} \n          # Or use username/password\
      \ (less secure)\n          # username: ${ARGOCD_USERNAME}\n          # password:\
      \ ${ARGOCD_PASSWORD}\n```\n\n**Note on Security:** Avoid putting the actual\
      \ token or password directly in the ConfigMap. Instead, use the `${VAR_NAME}`\
      \ syntax and define those variables in a **Secret** that is injected into the\
      \ RHDH deployment's environment variables.\n\n---\n\n### 2. Enable the Plugin\
      \ (Dynamic Plugins)\nRHDH uses a dynamic plugin architecture. Most common plugins\
      \ are included but might need to be enabled in your `dynamic-plugins.yaml` (which\
      \ is often part of the same ConfigMap or a separate one).\n\nEnsure the Argo\
      \ CD plugin is enabled:\n\n```yaml\nplugins:\n  - package: './dynamic-plugins/dist/backstage-community-plugin-argocd'\n\
      \    disabled: false\n```\n\n---\n\n### 3. Update the Catalog Metadata (`catalog-info.yaml`)\n\
      Once the system-wide configuration is done, you need to tell the Developer Hub\
      \ which Argo CD application corresponds to which Component. You do this by adding\
      \ **annotations** to your component's `catalog-info.yaml` file.\n\nYou have\
      \ two main ways to link them:\n\n#### Option A: Link by Application Name (Simplest)\n\
      Use this if you want to link a component to one specific Argo CD app.\n\n```yaml\n\
      apiVersion: backstage.io/v1alpha1\nkind: Component\nmetadata:\n  name: my-service\n\
      \  annotations:\n    argocd/app-name: 'my-argo-app-name'\nspec:\n  type: service\n\
      \  # ... rest of the file\n```\n\n#### Option B: Link by Label Selector\nUse\
      \ this if you want to pull in multiple Argo CD applications that share a specific\
      \ label.\n\n```yaml\nmetadata:\n  annotations:\n    argocd/app-selector: 'app.kubernetes.io/instance=my-service'\n\
      ```\n\n---\n\n### 4. Verify the UI\nOnce you have updated the config and the\
      \ catalog file:\n1.  **Restart RHDH:** If you changed the ConfigMap/Environment\
      \ variables, you may need to rollout the deployment for changes to take effect.\n\
      2.  **Navigate to your Component:** Go to the \"Catalog\" in RHDH and select\
      \ your service.\n3.  **Check the Tabs:** You should now see an **Argo CD** tab.\
      \ If it's not visible, look for a card on the **Overview** tab.\n\n### Troubleshooting\
      \ Tips\n*   **Permissions:** Ensure the token/user you provided in Step 1 has\
      \ at least \"read\" access to the applications in Argo CD.\n*   **CORS/Proxy:**\
      \ If you see errors about \"Failed to fetch,\" ensure your Argo CD instance\
      \ allows requests from the RHDH domain or that the RHDH backend proxy is configured\
      \ correctly.\n*   **Logs:** Check the RHDH pod logs (`oc logs deployment/rhdh-operator\
      \ -n <namespace>`) to see if there are any connection errors when it tries to\
      \ reach Argo CD.\n\nIf you hit any specific error messages during the setup,\
      \ feel free to share them, and I can help you debug!"
