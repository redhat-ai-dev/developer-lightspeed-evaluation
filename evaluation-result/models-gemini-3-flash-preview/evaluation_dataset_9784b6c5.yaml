  description: plugins
  turns:
  - contexts:
    - '# Configuring dynamic plugins # Installing Ansible plug-ins for Red Hat Developer
      Hub Ansible plug-ins for Red Hat Developer Hub deliver an Ansible-specific portal
      experience with curated learning paths, push-button content creation, integrated
      development tools, and other opinionated resources. Installing Ansible plug
      ins for Red Hat Developer Hub #'
    expected_response: Ansible plug-ins for Red Hat Developer Hub deliver an Ansible-specific
      portal experience that includes curated learning paths, push-button content
      creation, integrated development tools, and other opinionated resources.
    query: What kind of portal experience and specific resources are delivered by
      installing the Ansible plug-ins for the Red Hat Developer Hub?
    response: "Installing the Ansible plugins for the **Red Hat Developer Hub (RHDH)**\
      \ transforms the portal into a centralized command center for automation, bridging\
      \ the gap between application development and infrastructure orchestration.\
      \ \n\nBy integrating Ansible with RHDH (which is built on Backstage), you provide\
      \ developers with a \"single pane of glass\" to view, trigger, and manage automation\
      \ without leaving the portal.\n\nHere is a breakdown of the experience and resources\
      \ delivered:\n\n### 1. Enhanced Portal Experience\nThe Ansible plugins shift\
      \ the developer experience from manual coordination to automated self-service:\n\
      \n*   **Unified Visibility:** Developers no longer need to switch between the\
      \ RHDH and the Ansible Automation Platform (AAP) UI to check the status of infrastructure\
      \ jobs.\n*   **Contextual Automation:** Ansible data is attached directly to\
      \ the software components that use it. If a microservice relies on a specific\
      \ Ansible playbook for deployment, that relationship is visible in the Catalog.\n\
      *   **Streamlined Self-Service:** Through the **Software Templates (Scaffolder)**,\
      \ developers can trigger complex Ansible workflows (like provisioning a VPC\
      \ or a database) as part of the initial project creation process.\n\n---\n\n\
      ### 2. Specific Resources Delivered\nOnce the plugins (specifically the Ansible\
      \ frontend and backend plugins) are configured, the following resources and\
      \ features become available within the portal:\n\n#### A. The Ansible Dashboard\
      \ Tab\nFor any component in the Software Catalog configured with Ansible, a\
      \ new **Ansible tab** appears. This tab typically displays:\n*   **Job Templates:**\
      \ A list of available Ansible job templates associated with that specific component.\n\
      *   **Job Runs:** A history of recent executions, including their status (Success,\
      \ Failed, Running), who started them, and when they finished.\n*   **Inventory\
      \ Insights:** Visibility into the hosts or groups that the Ansible automation\
      \ is targeting.\n\n#### B. Software Catalog Entities\nThe plugins allow you\
      \ to ingest Ansible-specific metadata into the Backstage Catalog. This means\
      \ you can search for and discover:\n*   **Ansible Job Templates** as first-class\
      \ entities.\n*   **Playbooks and Roles** documented within the portal.\n*  \
      \ **Relationship Mapping:** See which Team owns which Ansible Job Template and\
      \ which System it affects.\n\n#### C. Ansible Actions for Software Templates\n\
      One of the most powerful resources is the addition of **Ansible-specific actions**\
      \ in the RHDH Scaffolder. This allows platform engineers to create templates\
      \ that:\n*   Launch a Job Template in AAP as a step in a \"Create New App\"\
      \ workflow.\n*   Wait for an Ansible job to complete before moving to the next\
      \ deployment step.\n*   Pass parameters from a portal form directly into Ansible\
      \ Extra Vars.\n\n#### D. Integration with Ansible Automation Platform (AAP)\n\
      The plugins act as a bridge to your AAP clusters, delivering:\n*   **Controller\
      \ Integration:** Direct connection to the Ansible Automation Controller API.\n\
      *   **Credential Management:** Secure handling of tokens to ensure developers\
      \ only see or run automation they are authorized to access based on their RHDH/RBAC\
      \ permissions.\n\n---\n\n### 3. Key Use Cases for Developers\n*   **Infrastructure\
      \ Provisioning:** Use a template in RHDH to request a new environment, which\
      \ triggers an Ansible Job Template to spin up OpenShift namespaces or AWS resources.\n\
      *   **Day 2 Operations:** Restart services, clear caches, or perform database\
      \ migrations via Ansible jobs directly from the component's page in RHDH.\n\
      *   **Troubleshooting:** Quickly identify if a deployment failed due to an Ansible\
      \ automation error by viewing job logs directly within the developer portal.\n\
      \n### Summary Table\n| Feature | Resource Delivered | Benefit |\n| :--- | :---\
      \ | :--- |\n| **Catalog Integration** | Ansible Job Template Entities | Improved\
      \ discoverability of existing automation. |\n| **Entity Tabs** | Job Run History\
      \ & Status | Reduced context switching between RHDH and AAP. |\n| **Scaffolder\
      \ Actions** | `ansible:job:run` actions | Automated infrastructure setup during\
      \ project creation. |\n| **Search** | Ansible Metadata Indexing | Ability to\
      \ find automation assets alongside source code. |\n\nBy installing these plugins,\
      \ you empower your developers to move faster with **\"Golden Paths\"** that\
      \ include both the application code and the infrastructure automation required\
      \ to run it."
