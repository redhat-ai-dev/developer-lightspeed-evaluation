  description: plugins
  turns:
  - contexts:
    - 'metadata: name: backstage read only rules: ... apiGroups: tekton.dev resources:
      pipelines pipelineruns taskruns verbs: get list ``` 2. To view the Tekton PipelineRuns
      list in the side panel and the latest PipelineRuns status in the Topology node
      decorator, add the following code to the kubernetes.customResources property
      in your app-config.yaml file: ```yaml kubernetes: ... customResources: group:
      ''tekton.dev'' apiVersion: ''v1'' plural: ''pipelines'' group: ''tekton.dev''
      apiVersion: ''v1'' plural: ''pipelineruns'' group: ''tekton.dev'' apiVersion:
      ''v1'' plural: ''taskruns'' ``` ### Viewing virtual machines 1. The OpenShift
      Virtualization operator is installed and configured on a Kubernetes cluster.
      .Procedure 2. Grant read access to the VirtualMachines resource in the ClusterRole:
      ```yaml ... apiVersion: rbac.authorization.k8s.io/v1 kind: ClusterRole metadata:
      name: backstage read only rules: ... apiGroups: kubevirt.io resources: virtualmachines
      virtualmachineinstances verbs: get list ``` 3. To view the virtual machine nodes
      on the topology plugin, add the following code to the kubernetes.customResources
      property in the app-config.yaml file: ```yaml kubernetes: ... customResources:
      group: ''kubevirt.io'' apiVersion: ''v1'' plural: ''virtualmachines'' group:
      ''kubevirt.io'' apiVersion: ''v1'' plural: ''virtualmachineinstances'' ``` ###
      Enabling the source code editor To enable the source code editor, you must grant
      read access to the CheClusters resource in the ClusterRole as shown in the following
      example code: ```yaml ... apiVersion: rbac.authorization.k8s.io/v1 kind: ClusterRole
      metadata: name: backstage read only rules: ... apiGroups: org.eclipse.che resources:
      checlusters verbs: get list ``` To use the source code editor, you must add
      the following configuration to the kubernetes.customResources property in your
      app-config.yaml file: ```yaml kubernetes: ... customResources: group: ''org.eclipse.che''
      apiVersion: ''v2'' plural: ''checlusters'' ``` ## Managing labels and annotations
      for Topology plugins ### Linking to the source code editor or the source Add
      the following annotations to workload resources, such as Deployments to navigate
      to the Git repository of the associated application using the source code editor:
      ```yaml annotations: app.openshift.io/vcs uri: <GIT_REPO_URL> ``` Add the following
      annotation to navigate to a specific branch: ```yaml annotations: app.openshift.io/vcs
      ref: <GIT_REPO_BRANCH> ``` [NOTE] ---- If Red Hat OpenShift Dev Spaces is installed
      and configured and Git URL annotations are also added to the workload YAML file,
      then clicking on the edit code decorator redirects you to the Red Hat OpenShift
      Dev Spaces instance. ---- [NOTE] ---- When you deploy your application using
      the OCP Git import flows, then you do not need to add the labels as import flows
      do that. Otherwise, you need to add the labels manually to the workload YAML
      file. ---- You can also add the app.openshift.io/edit-link annotation with the
      edit URL that you want to access using the decorator. ### Entity annotation/label
      For RHDH to detect that an entity has Kubernetes components, add the following
      annotation to the catalog-info.yaml file of the entity: ```yaml annotations:
      backstage.io/kubernetes id: <BACKSTAGE_ENTITY_NAME> ``` Add the following label
      to the resources so that the Kubernetes plugin gets the Kubernetes resources
      from the requested entity: ```yaml labels: backstage.io/kubernetes id: <BACKSTAGE_ENTITY_NAME>`
      ``` [NOTE] ---- When using the label selector, the mentioned labels must be
      present on the resource. ---- ### Namespace annotation To identify the Kubernetes
      resources using the defined namespace, add the backstage.io/kubernetes namespace
      annotation: ```yaml annotations: backstage.io/kubernetes namespace: <RESOURCE_NS>
      ``` The Red Hat OpenShift Dev Spaces instance is not accessible using the source
      code editor if the backstage.io/kubernetes-namespace annotation is added to
      the catalog-info.yaml file. To retrieve the instance URL, you require the CheCluster
      custom resource (CR). As the CheCluster CR is created in the openshift-devspaces
      namespace, the instance URL is not retrieved if the namespace annotation value
      is not openshift-devspaces. ### Label selector query annotation You can write
      your own custom label, which RHDH uses to find the Kubernetes resources. The
      label selector takes precedence over the ID annotations: ```yaml annotations:
      backstage.io/kubernetes label selector: ''app=my app,component=front end'' ```
      If you have multiple entities while Red Hat Dev Spaces is configured and want
      multiple entities to support the edit code decorator that redirects to the Red
      Hat Dev Spaces instance, you can add the backstage.io/kubernetes-label-selector
      annotation to the catalog-info.yaml file for each entity. ```yaml annotations:
      backstage.io/kubernetes label selector: ''component in (<BACKSTAGE_ENTITY_NAME>,che)''
      ``` If you are using the previous label selector, you must add the following
      labels to your resources so that the Kubernetes plugin gets the Kubernetes resources
      from the requested entity: ```yaml labels: component: che # add this label to
      your che cluster instance labels: component: <BACKSTAGE_ENTITY_NAME> # add this
      label to the other resources associated with your entity ``` You can also write
      your own custom query for the label selector with unique labels to differentiate
      your entities. However, you need to ensure that you add those labels to the
      resources associated with your entities including your CheCluster instance.
      ### Displaying icon in the node To display a runtime icon in the topology nodes,
      add the following label to workload resources, such as Deployments: ```yaml
      labels: app.openshift.io/runtime: <RUNTIME_NAME> ``` Alternatively, you can
      include the following label to display the runtime icon: ```yaml labels: app.kubernetes.io/name:
      <RUNTIME_NAME> ``` Supported values of <RUNTIME_NAME> include: django dotnet
      drupal go gopher golang grails jboss jruby js nginx nodejs openjdk perl phalcon
      php python quarkus rails redis rh spring boot rust java rh openjdk ruby spring
      spring boot [NOTE] ---- Other values result in icons not being rendered for
      the node. ---- ### App grouping To display workload resources such as deployments
      or pods in a visual group, add the following label: ```yaml labels: app.kubernetes.io/part
      of: <GROUP_NAME> ``` ### Node connector To display the workload resources such
      as deployments or pods with a visual connector, add the following annotation:
      ```yaml annotations: app.openshift.io/connects-to: ''[{"apiVersion": <RESOURCE_APIVERSION>,"kind":
      <RESOURCE_KIND>,"name": <RESOURCE_NAME>}]'' ``` For more information about the
      labels and annotations, see Guidelines for labels and annotations for OpenShift
      applications. # Bulk importing in Red Hat Developer Hub [IMPORTANT] ---- These
      features are for Technology Preview only. Technology Preview features are not
      supported with Red Hat production service level agreements (SLAs), might not
      be functionally complete, and Red Hat does not recommend using them for production.
      These features provide early access to upcoming product features, enabling customers
      to test functionality and provide feedback during the development process. For
      more information'
    expected_response: 'To enable visibility for Tekton, you must first grant read
      access in the `ClusterRole` for the `tekton.dev` apiGroup, allowing `get` and
      `list` verbs for the `pipelines`, `pipelineruns`, and `taskruns` resources.
      Following that, to make the Tekton PipelineRuns list appear in the side panel
      and to show the latest PipelineRuns status in the Topology node decorator, you
      need to add the following configurations to the `kubernetes.customResources`
      property in your `app-config.yaml` file: `group: ''tekton.dev'', apiVersion:
      ''v1'', plural: ''pipelines''`, `group: ''tekton.dev'', apiVersion: ''v1'',
      plural: ''pipelineruns''`, and `group: ''tekton.dev'', apiVersion: ''v1'', plural:
      ''taskruns''`.'
    query: As a platform engineer responsible for integrating CI/CD tooling, what
      are the precise configuration steps, including both RBAC rules and `app-config.yaml`
      modifications, that are necessary to enable the visibility of Tekton resources
      like PipelineRuns within the developer platform's user interface?
    response: "To enable visibility of Tekton resources (such as `PipelineRuns`, `TaskRuns`,\
      \ and `Pipelines`) within the Red Hat Developer Hub (RHDH) interface, you need\
      \ to configure the **Kubernetes backend** to fetch these specific Custom Resources\
      \ and ensure the **Tekton plugin** is active.\n\nAs a platform engineer, follow\
      \ these precise steps:\n\n---\n\n### 1. Kubernetes RBAC Configuration\nThe ServiceAccount\
      \ used by RHDH to communicate with your OpenShift/Kubernetes cluster must have\
      \ permissions to view Tekton resources.\n\nCreate a `ClusterRole` (or `Role`\
      \ if restricted to a specific namespace) and bind it to the Backstage ServiceAccount:\n\
      \n```yaml\napiVersion: rbac.authorization.k8s.io/v1\nkind: ClusterRole\nmetadata:\n\
      \  name: rhdh-tekton-read-role\nrules:\n  - apiGroups:\n      - tekton.dev\n\
      \    resources:\n      - pipelines\n      - pipelineruns\n      - taskruns\n\
      \      - conditions\n      - pipelinebinding\n      - triggeringpolicy\n   \
      \ verbs:\n      - get\n      - list\n      - watch\n---\napiVersion: rbac.authorization.k8s.io/v1\n\
      kind: ClusterRoleBinding\nmetadata:\n  name: rhdh-tekton-read-binding\nsubjects:\n\
      \  - kind: ServiceAccount\n    name: <RHDH_SERVICE_ACCOUNT_NAME>\n    namespace:\
      \ <RHDH_NAMESPACE>\nroleRef:\n  kind: ClusterRole\n  name: rhdh-tekton-read-role\n\
      \  apiGroup: rbac.authorization.k8s.io\n```\n\n---\n\n### 2. `app-config.yaml`\
      \ Configuration\nRHDH needs to be instructed to look for Tekton CRDs through\
      \ its Kubernetes locator. Modify your `app-config.yaml` (or the corresponding\
      \ ConfigMap/Secret) under the `kubernetes` section.\n\n```yaml\nkubernetes:\n\
      \  serviceLocatorMethod:\n    type: 'multiTenant'\n  clusterLocatorMethods:\n\
      \    - type: 'config'\n      clusters:\n        - name: <your-cluster-name>\n\
      \          url: ${K8S_CLUSTER_URL}\n          authProvider: 'serviceAccount'\n\
      \          serviceAccountToken: ${K8S_CLUSTER_TOKEN}\n          skipTLSVerify:\
      \ false\n          # Tell the Kubernetes plugin to fetch Tekton CRDs\n     \
      \     customResources:\n            - group: 'tekton.dev'\n              apiVersion:\
      \ 'v1' # or v1beta1 depending on your Tekton version\n              resource:\
      \ 'pipelineruns'\n            - group: 'tekton.dev'\n              apiVersion:\
      \ 'v1'\n              resource: 'taskruns'\n            - group: 'tekton.dev'\n\
      \              apiVersion: 'v1'\n              resource: 'pipelines'\n\n# Ensure\
      \ the Tekton plugin is not disabled if using dynamic plugins\ndynamicPlugins:\n\
      \  frontend:\n    janus-idp.backstage-plugin-tekton:\n      enabled: true\n\
      ```\n\n---\n\n### 3. Entity Metadata (Catalog)\nFor the Tekton resources to\
      \ appear on a specific Component's page, you must add the correct annotations\
      \ to the component's `catalog-info.yaml`. \n\nThe visibility is usually driven\
      \ by the **Kubernetes label selector**. RHDH will look for `PipelineRuns` that\
      \ have labels matching the component.\n\n**Example `catalog-info.yaml`:**\n\
      ```yaml\napiVersion: backstage.io/v1alpha1\nkind: Component\nmetadata:\n  name:\
      \ my-service\n  annotations:\n    # Essential for the Tekton plugin to activate\n\
      \    'janus-idp.io/tekton-enabled': 'true'\n    # Optional: If you want to filter\
      \ by a specific label on the PipelineRun\n    # If omitted, it often defaults\
      \ to 'app.kubernetes.io/instance: <name>'\n    'backstage.io/kubernetes-label-selector':\
      \ 'app.kubernetes.io/instance=my-service'\nspec:\n  type: service\n  lifecycle:\
      \ production\n  owner: user:guest\n```\n\n---\n\n### 4. Verification Steps\n\
      \n1.  **Labeling:** Ensure your Tekton `PipelineRuns` are actually labeled to\
      \ match the selector defined in the `catalog-info.yaml`. \n    *   *Example:*\
      \ If your component is `my-service`, your PipelineRun should have:\n       \
      \ ```yaml\n        labels:\n          app.kubernetes.io/instance: my-service\n\
      \        ```\n2.  **UI Check:** Navigate to the **Catalog**, select your component,\
      \ and look for the **CI/CD** tab (or **Tekton** tab, depending on your UI composition).\n\
      3.  **Logs:** If data isn't appearing, check the RHDH pod logs for Kubernetes\
      \ authentication errors:\n    ```bash\n    oc logs deployment/developer-hub\
      \ -n rhdh-operator\n    ```\n\n### Summary of Requirements\n*   **RBAC:** `get/list/watch`\
      \ on `tekton.dev` API group.\n*   **app-config.yaml:** Add `pipelineruns` and\
      \ `taskruns` to `kubernetes.customResources`.\n*   **Catalog Info:** Add `janus-idp.io/tekton-enabled:\
      \ 'true'` annotation.\n*   **Labeling:** Ensure Tekton resources in the cluster\
      \ have labels that match the Component's selector."
